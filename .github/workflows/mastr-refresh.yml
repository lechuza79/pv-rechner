name: MaStR Refresh

# Pulls the BNetzA Gesamtdatenexport (monthly XML dump), aggregates per
# region × energy type × segment × year, and upserts into Supabase. Replaces
# the older quarterly Zenodo pipeline; the BNetzA dump refreshes daily and
# is the authoritative source. The Zenodo path (scripts/mastr-refresh.ts)
# stays in the repo as a fallback if BNetzA ever goes down.
#
# Vercel cron is unsuitable here — Function timeout is too short and the
# 3 GB download exceeds Edge limits. GitHub Actions runners have ~14 GB
# free disk; the job budget is 120 min (the June 2026 run was cancelled at
# the old 60 min limit — download + aggregate + upload of the growing dump no
# longer fits in an hour, so the last successful data stayed at May).

on:
  schedule:
    # 04:00 UTC on the 5th of each month — BNetzA publishes daily, so by the
    # 5th the start-of-month data is stable. UTC keeps the schedule aligned
    # with BNetzA's own publication time (~05:00 UTC).
    - cron: "0 4 5 * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: mastr-refresh
  cancel-in-progress: false  # never interrupt an in-flight upsert

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Disk space before run
        run: df -h .

      - name: Run MaStR refresh (BNetzA, full pipeline)
        run: npm run mastr:refresh-bnetza -- --download --aggregate --upload

      - name: Disk space after run
        if: always()
        run: df -h .

      - name: Upload artifacts (schema + aggregates)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mastr-bnetza-snapshot
          path: |
            scripts/mastr-bnetza-schema.json
            scripts/.cache/bnetza/aggregates.json
            scripts/.cache/bnetza/resolved.json
          if-no-files-found: warn
          retention-days: 90

  # Nach dem Datenlauf alle Atlas-Gemeinde- (und Kreis-)Seiten aufwärmen: die
  # ISR-Seiten sind jetzt stale und rendern beim nächsten Zugriff neu — dieser
  # Crawl löst das gedrosselt aus, damit der erste echte Besucher eine gecachte
  # Seite bekommt statt den Kaltrender zu zahlen. Läuft NUR bei erfolgreichem
  # refresh; die Drosselung (Conc/Delay) schont die Supabase-Instanz.
  warm:
    needs: refresh
    runs-on: ubuntu-latest
    # ~11k Gemeinden gedrosselt (~2 req/s) = gut 1,5–2 h; großzügig gedeckelt.
    timeout-minutes: 180
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Warm atlas pages (throttled)
        run: npm run atlas:warm
