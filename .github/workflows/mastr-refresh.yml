name: MaStR Refresh

# Pulls the latest open-mastr Zenodo dump, aggregates, and upserts into
# Supabase. Runs quarterly to catch Zenodo's (irregular) release cadence.
# Can also be triggered manually via the Actions tab.

on:
  schedule:
    # 03:00 UTC on the 1st of Jan / Apr / Jul / Oct
    - cron: "0 3 1 1,4,7,10 *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: mastr-refresh
  cancel-in-progress: false  # never interrupt an in-flight upsert

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Disk space before run
        run: df -h .

      # Currently only --inspect is implemented. --aggregate and --upload
      # follow in subsequent iterations. The flag list is additive — append
      # once phases 2 + 3 land.
      - name: Run MaStR refresh
        run: npm run mastr:refresh -- --inspect

      - name: Upload schema report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mastr-schema
          path: scripts/mastr-schema.json
          if-no-files-found: warn
          retention-days: 30
