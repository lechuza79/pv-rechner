name: MaStR Refresh

# Pulls the latest open-mastr Zenodo dump, aggregates, and upserts into
# Supabase. Runs quarterly to catch Zenodo's (irregular) release cadence.
# Can also be triggered manually via the Actions tab.

on:
  schedule:
    # 03:00 UTC on the 1st of Jan / Apr / Jul / Oct
    - cron: "0 3 1 1,4,7,10 *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: mastr-refresh
  cancel-in-progress: false  # never interrupt an in-flight upsert

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Disk space before run
        run: df -h .

      # Full pipeline: download Zenodo dump, inspect schema, aggregate,
      # upload to Supabase. Runner has 14 GB free — the 1.3 GB ZIP +
      # ~4 GB extracted CSV fit comfortably.
      - name: Run MaStR refresh (full)
        run: npm run mastr:refresh -- --inspect --aggregate --upload

      - name: Upload artifacts (schema + aggregates)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mastr-snapshot
          path: |
            scripts/mastr-schema.json
            scripts/.cache/aggregates.json
          if-no-files-found: warn
          retention-days: 90
